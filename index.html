<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perceived Male Toxicity Score</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
      color: #fff;
    }
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      text-align: center;
      max-width: 500px;
      line-height: 1.5;
    }
    .container {
      width: 100%;
      max-width: 600px;
    }
    .category-label {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .feature-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #333;
      border-radius: 999px;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      user-select: none;
    }
    .feature-btn:hover {
      border-color: #555;
      background: #222;
    }
    .feature-btn.active {
      border-color: #e74c3c;
      background: #2a1515;
      color: #ff6b6b;
    }
    .feature-btn.active.negative {
      border-color: #3498db;
      background: #152a2a;
      color: #6bcfff;
    }
    .feature-btn .weight {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-left: 0.3rem;
    }
    .result-panel {
      margin-top: 2rem;
      padding: 2rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      text-align: center;
    }
    .score-display {
      font-size: 4rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .score-label {
      font-size: 0.9rem;
      color: #888;
      margin-top: 0.3rem;
    }
    .dominance {
      margin-top: 0.8rem;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .meter {
      margin-top: 1.2rem;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease, background 0.4s ease;
    }
    .factors {
      margin-top: 1.5rem;
      text-align: left;
    }
    .factors h3 {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .factor-item {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      font-size: 0.9rem;
      color: #aaa;
    }
    .factor-item .fw {
      font-weight: 600;
      min-width: 40px;
      text-align: right;
    }
    .factor-item .fw.pos { color: #ff6b6b; }
    .factor-item .fw.neg { color: #6bcfff; }
    .note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      max-width: 500px;
      line-height: 1.5;
    }
    a { color: #888; }
  </style>
</head>
<body>
  <h1>Perceived Male Toxicity</h1>
  <p class="subtitle">
    男性ファッションの"毒性"（危険・支配的・エッジの効いた魅力）をスコアリング
  </p>

  <div class="container">
    <div id="feature-buttons"></div>

    <div class="result-panel">
      <div class="score-display" id="score">50</div>
      <div class="score-label">Perceived Toxicity Score</div>
      <div class="dominance" id="dominance">moderate</div>
      <div class="meter"><div class="meter-fill" id="meter"></div></div>
      <div class="factors" id="factors"></div>
    </div>
  </div>

  <p class="note">
    ※ "Toxicity" は有害な行動ではなく、恋愛心理学における「エッジの効いた危険な雰囲気」を指します。<br>
    <a href="https://github.com/jim-auto/perceived-male-toxicity">GitHub</a>
  </p>

  <script>
    const FEATURES = {
      color: [
        { name: "black_clothing", weight: 10, label: "黒い服" },
        { name: "bright_colors", weight: -8, label: "明るい色" },
      ],
      outerwear: [
        { name: "leather_jacket", weight: 15, label: "レザージャケット" },
        { name: "formal_suit", weight: -5, label: "フォーマルスーツ" },
      ],
      fit: [
        { name: "rolled_sleeves", weight: 8, label: "袖まくり" },
        { name: "muscular_fit", weight: 12, label: "タイトフィット" },
        { name: "oversized_clothing", weight: -10, label: "オーバーサイズ" },
        { name: "minimal_style", weight: -3, label: "ミニマル" },
      ],
      accessory: [
        { name: "silver_chain", weight: 6, label: "チェーン" },
        { name: "sunglasses", weight: 5, label: "サングラス" },
        { name: "rings", weight: 4, label: "指輪" },
      ],
      grooming: [
        { name: "stubble", weight: 6, label: "無精ひげ" },
        { name: "slicked_back_hair", weight: 5, label: "オールバック" },
        { name: "tattoo", weight: 10, label: "タトゥー" },
      ],
      footwear: [
        { name: "boots", weight: 7, label: "ブーツ" },
        { name: "sneakers", weight: -2, label: "スニーカー" },
      ],
    };

    const CATEGORY_NAMES = {
      color: "カラー",
      outerwear: "アウター",
      fit: "フィット・スタイル",
      accessory: "アクセサリー",
      grooming: "グルーミング・ボディ",
      footwear: "フットウェア",
    };

    const active = new Set();

    function render() {
      const container = document.getElementById("feature-buttons");
      container.innerHTML = "";
      for (const [cat, items] of Object.entries(FEATURES)) {
        const label = document.createElement("div");
        label.className = "category-label";
        label.textContent = CATEGORY_NAMES[cat];
        container.appendChild(label);

        const row = document.createElement("div");
        row.className = "features";
        for (const f of items) {
          const btn = document.createElement("button");
          btn.className = "feature-btn" +
            (active.has(f.name) ? (f.weight < 0 ? " active negative" : " active") : "");
          const sign = f.weight >= 0 ? "+" : "";
          btn.innerHTML = `${f.label}<span class="weight">${sign}${f.weight}</span>`;
          btn.onclick = () => {
            active.has(f.name) ? active.delete(f.name) : active.add(f.name);
            render();
            updateScore();
          };
          row.appendChild(btn);
        }
        container.appendChild(row);
      }
    }

    function getDominance(score) {
      if (score >= 80) return "very high";
      if (score >= 65) return "high";
      if (score >= 45) return "moderate";
      if (score >= 25) return "low";
      return "very low";
    }

    function getColor(score) {
      if (score >= 70) return "#e74c3c";
      if (score >= 50) return "#e67e22";
      if (score >= 30) return "#f1c40f";
      return "#3498db";
    }

    function updateScore() {
      const allFeatures = Object.values(FEATURES).flat();
      const matched = allFeatures.filter(f => active.has(f.name));
      const raw = 50 + matched.reduce((s, f) => s + f.weight, 0);
      const score = Math.max(0, Math.min(100, raw));
      const color = getColor(score);

      document.getElementById("score").textContent = score;
      document.getElementById("dominance").textContent = getDominance(score);
      document.getElementById("dominance").style.color = color;

      const meter = document.getElementById("meter");
      meter.style.width = score + "%";
      meter.style.background = color;

      const factorsEl = document.getElementById("factors");
      if (matched.length === 0) {
        factorsEl.innerHTML = "";
        return;
      }
      const sorted = [...matched].sort((a, b) => b.weight - a.weight);
      factorsEl.innerHTML = "<h3>Factors</h3>" +
        sorted.map(f => {
          const sign = f.weight >= 0 ? "+" : "";
          const cls = f.weight >= 0 ? "pos" : "neg";
          return `<div class="factor-item"><span>${f.label}</span><span class="fw ${cls}">${sign}${f.weight}</span></div>`;
        }).join("");
    }

    render();
    updateScore();
  </script>
</body>
</html>
